# git-cliff configuration
# Generates CHANGELOG.md from conventional commits.
#
# Run manually:  uvx git-cliff -o CHANGELOG.md
# In CI:         uvx git-cliff --latest -o CHANGELOG.md   (current tag only)

[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.
Versions follow [Semantic Versioning](https://semver.org).\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
{{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`]({{ remote.link }}/commit/{{ commit.id }}))\
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[remote.github]
owner = "AndroZa0812"
repo = "HyperInfer"

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

commit_parsers = [
  { message = "^feat",     group = "Features"        },
  { message = "^fix",      group = "Bug Fixes"       },
  { message = "^perf",     group = "Performance"     },
  { message = "^refactor", group = "Refactoring"     },
  { message = "^docs",     group = "Documentation"   },
  { message = "^test",     group = "Testing"         },
  { message = "^chore",    group = "Miscellaneous",  skip = true },
  { message = "^style",    skip = true               },
  { message = "^ci",       skip = true               },
]

# Only include commits since the last tag
filter_commits = true
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "newest"
