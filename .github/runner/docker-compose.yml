# IMPORTANT: This runner runs INSIDE Docker, so it always uses Linux (linux-arm64)
# even on macOS/Windows. The runner architecture should NOT match your host OS,
# it should match the Docker container OS (Linux ARM64 for Apple Silicon Macs).
# Only change RUNNER_VERSION if GitHub releases a newer version.

services:
  github-runner:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Use the latest runner version from GitHub
        # Check: https://github.com/actions/runner/releases
        - RUNNER_VERSION=2.333.1
        # Use linux-arm64 for ARM64 Docker containers (Apple Silicon Macs, AWS Graviton, etc.)
        - RUNNER_ARCH=linux-arm64
    container_name: hyperinfer-github-runner
    environment:
      # Required: Set these when running
      - REPO_URL=${REPO_URL:-https://github.com/your-username/HyperInfer}
      - RUNNER_TOKEN=${RUNNER_TOKEN}
      - RUNNER_NAME=${RUNNER_NAME:-hyperinfer-runner}
      - RUNNER_LABELS=self-hosted,Linux,ARM64,pr-agent
    volumes:
      # Docker socket for Docker-in-Docker (PR Agent uses Docker)
      - /var/run/docker.sock:/var/run/docker.sock
      # Runner work directory
      - runner-work:/home/runner/_work
    # Option 1: Use host network (simplest, runner sees host's localhost:8001)
    # Works on Linux, may not work on macOS/Windows Docker Desktop
    network_mode: host
    
    # Option 2: Use bridge network with extra_hosts (more isolated)
    # Uncomment below and comment out 'network_mode: host' if Option 1 doesn't work:
    # networks:
    #   - runner-network
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Option 3: Run llama-server inside Docker alongside the runner
  # This is the most isolated approach
  # Uncomment the entire llama-server service block below and comment out Option 1:
  # llama-server:
  #   image: ghcr.io/ggml-org/llama.cpp:server
  #   container_name: llama-server
  #   volumes:
  #     - ${MODELS_DIR:-./models}:/models:ro
  #   ports:
  #     - "8001:8000"
  #   command: >
  #     -m /models/gemma-4-26B-A4B-it-UD-Q4_K_XL.gguf
  #     --host 0.0.0.0
  #     --port 8000
  #     -c 128000
  #     --temp 1.0
  #     --top-p 0.95
  #     --top-k 64
  #   networks:
  #     - runner-network
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]

networks:
  runner-network:
    driver: bridge

volumes:
  runner-work: