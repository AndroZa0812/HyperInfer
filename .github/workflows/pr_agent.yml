name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created, edited]

jobs:
  pr_agent_job:
    # Allow running on PRs created by anyone (including bots)
    # Exclude PR Agent itself to prevent infinite comment loops
    if: ${{ github.event.sender.login != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    name: Run pr agent on every pull request, respond to user comments
    steps:
      - name: PR Agent action step
        id: pragent
        uses: qodo-ai/pr-agent@v0.34
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          config.model: nvidia_nim/google/gemma-4-31b-it
          config.fallback_models: ["nvidia_nim/google/gemma-4-31b-it"]
          config.custom_model_max_tokens: 128000
          github_action_config.auto_review: true
          github_action_config.auto_describe: true
          github_action_config.auto_improve: true