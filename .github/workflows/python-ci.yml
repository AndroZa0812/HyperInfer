name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  # ---------------------------------------------------------------------------
  # Detect whether any Python files changed so downstream jobs can skip early.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect Python changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      python: ${{ steps.filter.outputs.python }}
      integration: ${{ steps.filter.outputs.integration }}
    steps:
      - uses: actions/checkout@v4

      - name: Check changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - '**/*.py'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'crates/hyperinfer-python/src/**'
            integration:
              - '**/*.py'
              - '**/tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'crates/hyperinfer-python/src/**'

  # ---------------------------------------------------------------------------
  # Format & lint — ruff check + ruff format + mypy
  # ---------------------------------------------------------------------------
  format-lint:
    name: Format & Lint
    needs: changes
    if: |
      needs.changes.outputs.python == 'true' ||
      github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Ruff — lint
        run: uv run ruff check .

      - name: Ruff — format check
        run: uv run ruff format --check .

      - name: Mypy — type check
        run: uv run mypy .

      - name: Bandit — security check
        run: uv run bandit -r -c pyproject.toml .

  # ---------------------------------------------------------------------------
  # Unit tests — pytest -m "not integration"
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    needs: changes
    if: |
      needs.changes.outputs.python == 'true' ||
      github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-py-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-py-

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install workspace deps
        run: uv sync --all-packages

      - name: Build maturin extension
        run: uv run maturin develop --uv
        working-directory: crates/hyperinfer-python

      - name: Run unit tests
        run: uv run pytest -m "not integration" --cov --cov-report=term-missing --junit-xml=junit.xml -o junit_family=xunit1

      - name: Upload Test Results to Trunk.io
        if: ${{ !cancelled() && env.TRUNK_API_TOKEN != '' }}
        continue-on-error: true
        uses: trunk-io/analytics-uploader@v2.0.8
        with:
          junit-paths: "**/junit.xml"
          org-slug: androza-corp
          token: ${{ secrets.TRUNK_API_TOKEN }}

  # ---------------------------------------------------------------------------
  # Integration tests — conditional on changed Python / test files, push to
  # main, or the 'needs-integration-tests' PR label.
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests
    needs: changes
    if: |
      needs.changes.outputs.integration == 'true' ||
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      contains(github.event.pull_request.labels.*.name, 'needs-integration-tests')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-py-integ-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-py-integ-

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install workspace deps
        run: uv sync --all-packages

      - name: Build maturin extension
        run: uv run maturin develop --uv
        working-directory: crates/hyperinfer-python

      - name: Run integration tests
        run: uv run pytest -m "integration" --tb=short --junit-xml=junit.xml -o junit_family=xunit1

      - name: Upload Test Results to Trunk.io
        if: ${{ !cancelled() && env.TRUNK_API_TOKEN != '' }}
        continue-on-error: true
        uses: trunk-io/analytics-uploader@v2.0.8
        with:
          junit-paths: "**/junit.xml"
          org-slug: androza-corp
          token: ${{ secrets.TRUNK_API_TOKEN }}

  # ---------------------------------------------------------------------------
  # Fan-in: single required status check for branch protection / merge queue.
  # Always runs; fails if any upstream job failed or was cancelled.
  # Register "ci-success (Python)" as the required check in branch protection.
  # ---------------------------------------------------------------------------
  ci-success:
    name: ci-success (Python)
    runs-on: ubuntu-latest
    needs: [format-lint, unit-tests, integration-tests]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || \
                "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more Python CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All Python CI jobs passed."
