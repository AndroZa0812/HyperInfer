name: Release

# Triggered by a changeset-generated version bump:
#   npx changeset version → commits + pushes a "Version Packages" tag

on:
  push:
    branches:
      - main

permissions: {}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  detect:
    name: Detect changed packages
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Detect changed packages
        id: detect
        run: |
          bun install
          CHANGED=$(bun scripts/get-changed-packages.js)
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.package }}
    needs: detect
    if: needs.detect.outputs.changed != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ${{ fromJSON(needs.detect.outputs.changed) }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup environment
        run: |
          case "${{ matrix.package }}" in
            hyperinfer-python) dir="crates/hyperinfer-python" ;;
            hyperinfer-langchain) dir="bindings/hyperinfer-langchain" ;;
            hyperinfer-llamaindex) dir="bindings/hyperinfer-llamaindex" ;;
            *) echo "Unknown package: ${{ matrix.package }}"; exit 1 ;;
          esac
          echo "PACKAGE_DIR=$dir" >> $GITHUB_ENV
      
      - name: Setup Rust
        if: matrix.package == 'hyperinfer-python'
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        if: matrix.package == 'hyperinfer-python'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/hyperinfer-python

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Build
        run: |
          chmod +x scripts/build-package.sh
          ./scripts/build-package.sh "${{ matrix.package }}" "$PACKAGE_DIR"
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package }}-dist
          path: dist/

  # ---------------------------------------------------------------------------
  # Publish all wheels to TestPyPI via OIDC trusted publishing
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi # GitHub environment gate (optional approval)
    permissions:
      id-token: write # required for OIDC trusted publishing
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true

  # ---------------------------------------------------------------------------
  # Create GitHub Release with changelog body and all wheels attached
  # ---------------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create releases
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.sha }}" # Temporary tag based on sha, changesets usually handles tag creation
          name: "Release ${{ github.sha }}"
          files: dist/*
          draft: false
