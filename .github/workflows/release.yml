name: Release

# Triggered by a version tag pushed by bump-my-version:
#   uvx bump-my-version bump minor   →   commits + pushes v0.2.0 tag
#
# Publishes to TestPyPI. Switch repository-url to https://upload.pypi.org/legacy/
# (and update the trusted publisher on PyPI) when ready for production.

on:
  push:
    branches:
      - main

permissions: {}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # Extract version from the tag and generate changelog for this release
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'chore: release')
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # git-cliff needs full history

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' crates/hyperinfer-python/pyproject.toml | cut -d'"' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog for this release
        id: changelog
        run: |
          uvx git-cliff --latest --strip header > RELEASE_NOTES.md 2>&1 || echo "No changelog entries found." > RELEASE_NOTES.md
          EOF_MARKER="RELEASE_NOTES_EOF_$(date +%s)"
          {
            echo "content<<$EOF_MARKER"
            cat RELEASE_NOTES.md
            echo "$EOF_MARKER"
          } >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Build hyperinfer (maturin / PyO3) wheels
  # Matrix: Linux x86_64, Linux aarch64, macOS x86_64, macOS arm64, Windows x86_64
  # ---------------------------------------------------------------------------
  build-hyperinfer:
    name: Build hyperinfer — ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          - os: ubuntu-latest
            target: aarch64
            manylinux: auto
          - os: macos-latest # Intel
            target: x86_64
            manylinux: ""
          - os: macos-14 # Apple Silicon
            target: aarch64
            manylinux: ""
          - os: windows-latest
            target: x86_64
            manylinux: ""
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: |
            3.11
            3.12
            3.13

      - name: Build wheels (Linux)
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          working-directory: crates/hyperinfer-python
          args: --release --out ../../dist --interpreter python3.11 python3.12 python3.13

      - name: Build wheels (macOS / Windows)
        if: runner.os != 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          working-directory: crates/hyperinfer-python
          args: --release --out ../../dist --interpreter python3.11 python3.12 python3.13

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: hyperinfer-${{ matrix.target }}-${{ matrix.os }}
          path: dist/*.whl

  # ---------------------------------------------------------------------------
  # Build pure-Python sdist + wheel for hyperinfer-langchain and hyperinfer-llamaindex
  # ---------------------------------------------------------------------------
  build-bindings:
    name: Build Python bindings
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build hyperinfer-langchain
        run: uvx --from build pyproject-build --installer uv --outdir ../../dist .
        working-directory: bindings/hyperinfer-langchain

      - name: Build hyperinfer-llamaindex
        run: uvx --from build pyproject-build --installer uv --outdir ../../dist .
        working-directory: bindings/hyperinfer-llamaindex

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-bindings
          path: dist/

  # ---------------------------------------------------------------------------
  # Publish all wheels to TestPyPI via OIDC trusted publishing
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to TestPyPI
    needs: [prepare, build-hyperinfer, build-bindings]
    runs-on: ubuntu-latest
    environment: testpypi # GitHub environment gate (optional approval)
    permissions:
      id-token: write # required for OIDC trusted publishing
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true

  # ---------------------------------------------------------------------------
  # Create GitHub Release with changelog body and all wheels attached
  # ---------------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    needs: [prepare, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create releases
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ needs.prepare.outputs.version }}"
          body: ${{ needs.prepare.outputs.changelog }}
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
